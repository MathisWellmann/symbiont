name: "Rust checks"
on:
  pull_request:
    branches: [main]
permissions:
  contents: read
  actions: read
env:
  RUSTFLAGS: "-D warnings" # Make all warnings deny.
  NIX_CONFIG: "accept-flake-config = true"
jobs:
  ci-meta:
    # Target self-hosted runner by label
    runs-on: [nixos]
    # SECURITY: Require manual approval for external PRs
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
    steps:
      - name: checkout-code
        uses: actions/checkout@v4
      - name: yamlfmt
        run: nix develop --command yamlfmt -lint .
  nix-checks:
    # Target self-hosted runner by label
    runs-on: [nixos]
    # SECURITY: Require manual approval for external PRs
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
    steps:
      - name: checkout-code
        uses: actions/checkout@v4
      - name: nix-flake-check
        run: nix flake check
      - name: nix-deadnix
        run: nix develop --command deadnix
      - name: nix-statix
        run: nix develop --command statix check
      - name: nix-alejandra
        run: nix develop --command alejandra --check .
  rust-checks:
    # Target self-hosted runner by label
    runs-on: [nixos]
    # SECURITY: Require manual approval for external PRs
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
    steps:
      - name: checkout-code
        uses: actions/checkout@v4
      - name: cargo-check
        run: nix develop --command cargo check
      - name: cargo-test
        run: nix develop --command bash -c "cargo nextest run"
      - name: cargo-clippy
        run: nix develop --command cargo clippy
      - name: cargo-bench
        run: nix develop --command cargo bench --no-run # Just to make sure it compiles
      - name: cargo-fmt
        run: nix develop --command cargo fmt --check
      - name: taplo
        run: nix develop --command taplo fmt --check
      - name: cargo-doc
        run: nix develop --command cargo doc
  miri:
    # Target self-hosted runner by label
    runs-on: [nixos]
    needs: [rust-checks]
    # SECURITY: Require manual approval for external PRs
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
    steps:
      - name: checkout-code
        uses: actions/checkout@v4
      - name: cargo-miri
        # Detect undefined behaviour in the unsafe code (panic-buffer
        # protocol, fn-pointer transmutes). Tests that compile or dlopen
        # dylibs are `#[cfg_attr(miri, ignore)]`d since Miri cannot spawn
        # processes or load libraries; the dylib preamble itself is covered
        # by compiling it into the test binary (see symbiont/src/unwind.rs).
        env:
          MIRIFLAGS: "-Zmiri-disable-isolation"
        run: nix develop --command bash -c "cargo miri test -p symbiont --lib"
  integration-tests:
    # Target self-hosted runner by label
    runs-on: [nixos]
    needs: [rust-checks]
    # SECURITY: Require manual approval for external PRs
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
    steps:
      - name: checkout-code
        uses: actions/checkout@v4
      - name: counter-example-smoke-test
        # Start a local llama-cpp server via devenv, then run the counter
        # example for 30s. This exercises the full pipeline: dylib creation,
        # compilation, loading, dispatch, LLM evolution, and hot-swap.
        run: |
          nix develop --command bash -c '
            devenv up -d
            devenv processes wait llama-server --timeout 120
            BASE_URL=http://127.0.0.1:8231 cargo run -p counter-example
            devenv processes down
          '
      - name: fizzbuzz-example-smoke-test
        run: |
          nix develop --command bash -c '
            devenv up -d
            devenv processes wait llama-server --timeout 120
            BASE_URL=http://127.0.0.1:8231 cargo run -p fizzbuzz-example
            devenv processes down
          '
      - name: rastrigin-example-smoke-test
        run: |
          nix develop --command bash -c '
            devenv up -d
            devenv processes wait llama-server --timeout 120
            BASE_URL=http://127.0.0.1:8231 timeout 120s cargo run -p rastrigin-example
            devenv processes down
          '
      - name: sort-example-smoke-test
        # Run the sort example which evolves a sorting algorithm across
        # multiple data distributions. The bubble sort default is slow,
        # so allow 180s for the full evolution loop.
        run: |
          nix develop --command bash -c '
            devenv up -d
            devenv processes wait llama-server --timeout 120
            BASE_URL=http://127.0.0.1:8231 timeout 180s cargo run -p sort-example
            devenv processes down
          '
      - name: struct-support-example-smoke-test
        run: |
          nix develop --command bash -c '
            devenv up -d
            devenv processes wait llama-server --timeout 120
            BASE_URL=http://127.0.0.1:8231 cargo run -p struct-support-example
            devenv processes down
          '
      - name: tool-calling-example-smoke-test
        run: |
          nix develop --command bash -c '
            devenv up -d
            devenv processes wait llama-server --timeout 120
            BASE_URL=http://127.0.0.1:8231 cargo run -p tool-calling-example
            devenv processes down
          '
