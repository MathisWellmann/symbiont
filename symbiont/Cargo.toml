[package]
authors = ["MathisWellmann <wellmannmathis@gmail.com>"]
categories = ["ai"]
description = "Agent harness for hot-reloadable function evolution in Rust."
edition = "2024"
keywords = ["agent", "dylib", "dynamic", "harness", "llm"]
name = "symbiont"
readme = "../README.md"
repository = "https://github.com/MathisWellmann/symbiont"
version = "0.1.0"

# TODO: workspace lints

[dependencies]
symbiont-macros = { path = "../symbiont-macros" }

rig-core.workspace = true
tokio.workspace = true
tracing.workspace = true

libloading = "0.8"
minstant = "0.1"
prettyplease = "0.2"
quote = "1"
syn = { version = "2", features = ["full"] }
thiserror = "2"

[dev-dependencies]
criterion = { version = "0.5", features = ["html_reports"] }

[[bench]]
name = "dispatch_overhead"
harness = false
