[package]
name = "symbiont"
version = "0.1.0"
edition = "2024"
authors = ["MathisWellmann <wellmannmathis@gmail.com>"]
description = "Agent harness where models write native Rust code as dylibs, that get hot-swapped into the primary binary."
readme = "../README.md"
repository = "https://github.com/MathisWellmann/symbiont"
keywords = ["agent", "llm", "harness", "dylib", "dynamic"]
categories = ["ai"]

[dependencies]
symbiont-lib = { path = "../symbiont-lib" }

syn = { version = "2", features = ["full"] }
quote = "1"

hot-lib-reloader = "0.8.2"
rig-core = "0.35"
tokio = { version = "1.0", features = ["full"] }
thiserror = "2"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
prettyplease = "0.2.37"
