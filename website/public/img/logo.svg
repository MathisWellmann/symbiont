<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 480" width="440" height="480">
  <defs>
    <linearGradient id="arc1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B35" />
      <stop offset="100%" style="stop-color:#F7C948" />
    </linearGradient>
    <linearGradient id="arc2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4ECDC4" />
      <stop offset="100%" style="stop-color:#00897B" />
    </linearGradient>
    <filter id="glow1" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow2" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="440" height="480" rx="24" fill="#0d1117"/>

  <!-- Subtle radial background glow -->
  <circle cx="220" cy="195" r="140" fill="#FF6B35" opacity="0.03"/>

  <!-- Outer ring — two half arcs with gap for arrows -->
  <path d="M220,75 A120,120 0 0,1 220,315" stroke="url(#arc1)" stroke-width="5.5" fill="none" stroke-linecap="round"/>
  <path d="M220,315 A120,120 0 0,1 220,75" stroke="url(#arc2)" stroke-width="5.5" fill="none" stroke-linecap="round"/>

  <!-- Arrow heads at the seams -->
  <polygon points="215,75 225,75 220,62" fill="#4ECDC4" filter="url(#glow2)"/>
  <polygon points="215,315 225,315 220,328" fill="#F7C948" filter="url(#glow2)"/>

  <!-- Dashed inner orbit ring -->
  <circle cx="220" cy="195" r="72" fill="none" stroke="#ffffff08" stroke-width="1" stroke-dasharray="6,8"/>

  <!-- Curly braces — large, subtle -->
  <text x="164" y="212" font-family="monospace" font-size="72" fill="#ffffff0d" font-weight="300">{</text>
  <text x="246" y="212" font-family="monospace" font-size="72" fill="#ffffff0d" font-weight="300">}</text>

  <!-- Center: fn keyword -->
  <text x="220" y="205" text-anchor="middle" font-family="monospace" font-size="36" fill="#FF6B35" font-weight="700" font-style="italic" filter="url(#glow1)">fn</text>

  <!-- Small orbiting nodes -->
  <circle cx="336" cy="165" r="5" fill="#FF6B35" opacity="0.9"/>
  <circle cx="336" cy="165" r="11" fill="#FF6B35" opacity="0.12"/>
  <circle cx="104" cy="225" r="5" fill="#4ECDC4" opacity="0.9"/>
  <circle cx="104" cy="225" r="11" fill="#4ECDC4" opacity="0.12"/>
  <circle cx="290" cy="285" r="3.5" fill="#F7C948" opacity="0.6"/>
  <circle cx="150" cy="105" r="3.5" fill="#00BFA5" opacity="0.6"/>
  <circle cx="310" cy="110" r="2.5" fill="#FF6B35" opacity="0.35"/>
  <circle cx="130" cy="280" r="2.5" fill="#4ECDC4" opacity="0.35"/>

  <!-- Project name: two <text> elements butted at join point to avoid tspan gap -->
  <text x="268" y="385" text-anchor="end" font-family="monospace" font-size="32" font-weight="700" fill="#ffffff">symbiont</text>
  <text x="268" y="385" text-anchor="start" font-family="monospace" font-size="32" font-weight="700" fill="#FF6B35">.rs</text>

  <!-- Tagline -->
  <text x="220" y="415" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#ffffff45" letter-spacing="3.5">AGENT HARNESS FOR FUNCTION EVOLUTION</text>
</svg>